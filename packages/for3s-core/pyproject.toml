[project]
name = "for3s-core"
version = "0.0.1"
description = "For3s OS — núcleo compartido (primer package del monorepo)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "asyncpg>=0.31.0",
    "httpx>=0.28.1",
    "python-telegram-bot>=22.7",
    "rich>=15.0.0",
]

[build-system]
requires = ["uv_build>=0.7"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-include = ["src/for3s_core/migrations/*.sql"]
