name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint + Types + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync deps
        run: uv sync --all-packages
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Types (ty)
        run: uv run ty check
      - name: Tests (pytest)
        run: uv run pytest -q

  security:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Bandit scan
        run: uvx bandit -r packages src scripts -ll

  pilar3-gate:
    name: Pilar 3 Gate (skeleton)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gate de código auto-generado
        run: python3 scripts/pilar3_gate.py