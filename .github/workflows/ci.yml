name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint + Types + Tests
    runs-on: ubuntu-latest
    services:
      # BD del CI: pgvector/pgvector:pg16 trae pgvector + pgcrypto (lo que usan las
      # migraciones — solo hacen CREATE EXTENSION pgcrypto). AGE no hace falta aquí:
      # los tests de integración que lo tocarían se saltan (skip) si no está.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: for3s
          POSTGRES_PASSWORD: for3s_ci
          POSTGRES_DB: for3s
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U for3s"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://for3s:for3s_ci@localhost:5432/for3s
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Habilitar extensiones (pgcrypto + vector)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=for3s_ci psql -h localhost -U for3s -d for3s -c "CREATE EXTENSION IF NOT EXISTS pgcrypto; CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Sync deps
        run: uv sync --all-packages
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      # #2: ty es experimental → informativo, NO bloquea el CI (ruff+pytest dan la garantía).
      - name: Types (ty, informativo)
        run: uv run ty check
        continue-on-error: true
      - name: Tests (pytest)
        run: uv run pytest -q

  security:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # #3: bandit con la config del pyproject (skips justificados); sigue cazando lo demás.
      - name: Bandit scan
        run: uvx bandit -c pyproject.toml -r packages src scripts -ll

  pilar3-gate:
    name: Pilar 3 Gate (skeleton)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gate de código auto-generado
        run: python3 scripts/pilar3_gate.py
