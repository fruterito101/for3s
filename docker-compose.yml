# For3s OS — orquestación de los 4 servicios (C1).
# Todo lo que el tester necesita corre aquí. Orden de arranque garantizado por
# healthchecks: postgres → valkey → agent (migra+bot) → worker.
#
# Las keys (Claude/Telegram/PAT) y el nombre vienen del .env que crea el wizard.

name: for3s

services:
  # 1) BASE DE DATOS — Postgres 16 + AGE + pgvector (imagen propia, C2.B)
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    image: for3s-postgres:local
    environment:
      POSTGRES_USER: for3s
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-for3s_local}
      POSTGRES_DB: for3s
    volumes:
      - for3s_pgdata:/var/lib/postgresql/data   # ← la memoria persiste aquí
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U for3s -d for3s"]
      interval: 5s
      timeout: 5s
      retries: 20            # espera hasta ~100s a que esté READY
    restart: unless-stopped

  # 2) CACHE + COLA DE JOBS — Valkey
  valkey:
    image: valkey/valkey:8
    volumes:
      - for3s_valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # 3) AGENTE — el bot de Telegram. Corre migraciones ANTES de arrancar.
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    image: for3s-agent:local
    depends_on:
      postgres: { condition: service_healthy }   # ← no arranca hasta que la BD esté lista
      valkey:   { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://for3s:${POSTGRES_PASSWORD:-for3s_local}@postgres:5432/for3s
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      ANTHROPIC_TOKEN: ${ANTHROPIC_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FOR3S_MODEL: ${FOR3S_MODEL:-claude-sonnet-4-6}
      FOR3S_AGENT_NAME: ${FOR3S_AGENT_NAME:-For3s}
      GITHUB_PAT: ${GITHUB_PAT:-}
    # migra y LUEGO arranca el bot — el orden que decidimos (C2.A + C4.C)
    command: ["sh", "-c", "python -m for3s_core.cli migrate && python -m for3s_core.telegram_channel"]
    volumes:
      - /home/brianweb3/.for3s:/root/.for3s        # KEK del host (cifra/descifra secretos)
    # v1 (Opción B): el agente NO lanza contenedores (sin DinD, cero acceso al
    # Docker del host). GitHub-MCP y render llegan en v1.1 como servicios HERMANOS
    # de red declarados aquí mismo, y el agente solo se conecta a ellos.
    restart: unless-stopped

  # 4) WORKER — los jobs nocturnos (backup/CLS/Microglía/DMN). Misma imagen.
  worker:
    image: for3s-agent:local
    depends_on:
      postgres: { condition: service_healthy }
      valkey:   { condition: service_healthy }
      agent:    { condition: service_started }   # tras el agente (que ya migró)
    environment:
      DATABASE_URL: postgresql://for3s:${POSTGRES_PASSWORD:-for3s_local}@postgres:5432/for3s
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      ANTHROPIC_TOKEN: ${ANTHROPIC_TOKEN}
      FOR3S_MODEL: ${FOR3S_MODEL:-claude-sonnet-4-6}
    command: ["arq", "for3s_core.tasks.WorkerSettings"]
    volumes:
      - /home/brianweb3/.for3s:/root/.for3s
    restart: unless-stopped

volumes:
  for3s_pgdata:      # la BD (memoria, skills, todo) — se borra con `compose down -v`
  for3s_valkeydata:

# Red interna privada: los 4 servicios se hablan por nombre (postgres, valkey...).
# Nadie de afuera entra (no se exponen puertos al host salvo lo mínimo).
networks:
  default:
    name: for3s_net
